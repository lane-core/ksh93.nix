name: update-nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: prefetch latest dev
        id: prefetch
        run: |
          hash=$(nix-prefetch-git --url https://github.com/ksh93/ksh --rev dev | jq -r '.hash')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: update nightly hash
        run: |
          sed -i "s|hash = \"sha256-[^\"]*\";|hash = \"${{ steps.prefetch.outputs.hash }}\";|" packages/nightly.nix

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add packages/nightly.nix
          git commit -m "ksh-nightly: update dev branch hash to ${{ steps.prefetch.outputs.hash }}"
          git push
